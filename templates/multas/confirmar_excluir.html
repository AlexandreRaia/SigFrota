{% extends "base.html" %}
{% block title %}Excluir Multa — SisGestaoFrota{% endblock %}
{% block content %}
<div class="page-header">
  <div class="page-title">Confirmar exclusão</div>
</div>
<div style="background:#fff;border:1px solid var(--gray-200);border-radius:var(--radius);padding:2rem;max-width:500px;box-shadow:var(--shadow-sm)">
  <p style="font-size:.95rem;color:var(--gray-700);margin-bottom:1.5rem">
    Tem certeza que deseja excluir a multa <strong>{{ multa }}</strong>? Esta ação não pode ser desfeita.
  </p>
  <form method="post" style="display:flex;gap:.75rem">
    {% csrf_token %}
    <button type="submit" class="btn" style="background:#fee2e2;color:var(--red-600);border:1.5px solid #fecaca;padding:.5rem 1.2rem;border-radius:var(--radius-sm);font-weight:600;cursor:pointer">Sim, excluir</button>
    <a href="{% url 'multas:lista' %}" class="btn" style="background:#fff;color:var(--gray-700);border:1.5px solid var(--gray-200);padding:.5rem 1.2rem;border-radius:var(--radius-sm);font-weight:600">Cancelar</a>
  </form>
</div>
{% endblock %}
